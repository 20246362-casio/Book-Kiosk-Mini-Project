<div class="card"   [class.selected]="book.selected">
  <div class="book-image">
    <img [src]="book.image" [alt]="book.title">
  </div>
  <div class="content">
    <span class="genre">
      {{book.category}}
    </span>
    <h3>{{book.title}}</h3>
    <p>{{book.author}}</p>
    <h2>₱{{book.price}}</h2>
    <button (click)="add()">+</button>
  </div>
</div>
